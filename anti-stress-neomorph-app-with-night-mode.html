
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anti-Stress Neomorph</title>
    <style>
        :root {
            /* Default Theme: Neutral */
            --bg-color: #E0E0E0;
            --button-color: #E0E0E0;
            --shadow-light: #ffffff;
            --shadow-dark: #bebebe;
            
            --button-size: 220px;
        }

        [data-theme="blue"] {
            --bg-color: #E3EDF7;
            --button-color: #E3EDF7;
            --shadow-light: #ffffff;
            --shadow-dark: #b8cadf;
        }

        [data-theme="sage"] {
            --bg-color: #D1DBCB;
            --button-color: #D1DBCB;
            --shadow-light: #e5ede0;
            --shadow-dark: #b2c0a7;
        }

        /* Night Mode - Deep Dark Neomorphism */
        [data-theme="night"] {
            --bg-color: #121212;
            --button-color: #121212;
            --shadow-light: #1e1e1e; /* Subtle light highlight in dark */
            --shadow-dark: #080808;  /* Deep dark shadow */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: justify-content 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #app-container.layout-bottom {
            justify-content: flex-end;
            padding-bottom: 80px;
        }

        /* The Neomorphic Button */
        .neomorph-button {
            width: var(--button-size);
            height: var(--button-size);
            border-radius: 50%;
            background: var(--button-color);
            border: none;
            outline: none;
            cursor: pointer;
            position: relative;
            
            /* Default Convex State (Unpressed) */
            box-shadow: 
                12px 12px 24px var(--shadow-dark), 
                -12px -12px 24px var(--shadow-light);
            
            transition: box-shadow 0.08s ease, transform 0.08s ease;
        }

        /* Concave State (Pressed) */
        .neomorph-button.is-pressed {
            transform: scale(0.97);
            box-shadow: 
                inset 12px 12px 24px var(--shadow-dark), 
                inset -12px -12px 24px var(--shadow-light);
        }

        .neomorph-button::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Tweak Panel */
        #tweak-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 13px;
            z-index: 1000;
            color: inherit; /* Inherit from body to adapt to night mode */
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        /* Adjusting tweak panel text for night mode */
        [data-theme="night"] #tweak-panel {
            color: #eee;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tweak-group {
            margin-bottom: 12px;
        }

        .tweak-group:last-child {
            margin-bottom: 0;
        }

        .tweak-label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.5px;
            opacity: 0.6;
        }

        select {
            width: 100%;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.5);
            font-size: 13px;
            outline: none;
        }

        [data-theme="night"] select {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div id="tweak-panel">
        <div class="tweak-group">
            <span class="tweak-label">Theme</span>
            <select id="theme-select" onchange="updateTheme(this.value)">
                <option value="neutral">Neutral (Light)</option>
                <option value="blue">Pastel Blue</option>
                <option value="sage">Sage Green</option>
                <option value="night">Night (Dark)</option>
            </select>
        </div>
        <div class="tweak-group">
            <span class="tweak-label">Layout</span>
            <select id="layout-select" onchange="updateLayout(this.value)">
                <option value="center">Center</option>
                <option value="bottom">Bottom (One-hand)</option>
            </select>
        </div>
    </div>

    <div id="app-container">
        <button id="main-button" class="neomorph-button"></button>
    </div>

    <script>
        // --- AUDIO ENGINE ---
        const clickSound = new Audio('mpxzowa6-button-click.mp3');
        clickSound.preload = 'auto';

        function playClickSound() {
            clickSound.currentTime = 0;
            clickSound.play().catch(e => console.error("Audio error:", e));
        }

        // --- UI CONTROLS ---
        const container = document.getElementById('app-container');
        const button = document.getElementById('main-button');

        function updateTheme(theme) {
            document.body.setAttribute('data-theme', theme);
        }

        function updateLayout(layout) {
            if (layout === 'bottom') {
                container.classList.add('layout-bottom');
            } else {
                container.classList.remove('layout-bottom');
            }
        }

        // --- INTERACTION LOGIC ---
        function handlePressStart(e) {
            if (e.type === 'touchstart') e.preventDefault();
            button.classList.add('is-pressed');
            playClickSound();
        }

        function handlePressEnd(e) {
            if (e.type === 'touchend') e.preventDefault();
            button.classList.remove('is-pressed');
        }

        button.addEventListener('mousedown', handlePressStart);
        window.addEventListener('mouseup', handlePressEnd);

        button.addEventListener('touchstart', handlePressStart, { passive: false });
        button.addEventListener('touchend', handlePressEnd, { passive: false });

        button.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
