<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Relax Button Feature Graphic</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 1024px; height: 500px; margin: 0; overflow: hidden; }
    body {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      align-items: center;
      padding: 54px 82px;
      color: #242226;
      background:
        radial-gradient(circle at 78% 26%, rgba(112, 80, 177, .22), transparent 28%),
        linear-gradient(135deg, #f0eff2 0%, #d9d7dc 100%);
      font-family: "Avenir Next", "Trebuchet MS", sans-serif;
    }
    .eyebrow {
      margin-bottom: 18px;
      color: #6d50b1;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    h1 {
      max-width: 560px;
      margin: 0;
      font-size: 68px;
      line-height: .96;
      letter-spacing: -.055em;
    }
    p {
      max-width: 470px;
      margin: 24px 0 0;
      color: #656168;
      font-size: 23px;
      line-height: 1.35;
    }
    .button-wrap {
      position: relative;
      display: grid;
      place-items: center;
      width: 320px;
      height: 320px;
      justify-self: end;
      border-radius: 50%;
      background: #dedce1;
      box-shadow: 30px 30px 55px #aaa7ae, -28px -28px 55px #fff;
    }
    .button {
      display: grid;
      place-items: center;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      color: white;
      background: linear-gradient(145deg, #8061c6, #5d42a0);
      box-shadow: 18px 18px 36px #aaa7ae, -14px -14px 32px #fff, inset 8px 8px 18px rgba(255,255,255,.18);
      font-size: 72px;
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">A small tactile ritual</div>
    <h1>Press.<br>Listen. Reset.</h1>
    <p>Gentle haptics, satisfying sounds, and calm themes for overstimulated moments.</p>
  </main>
  <div class="button-wrap" aria-hidden="true">
    <div class="button">●</div>
  </div>
</body>
</html>
