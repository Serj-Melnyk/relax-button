<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Relax Button — Tactile anti-stress experience with satisfying clicks and gentle vibrations">
    <meta name="theme-color" content="#E0E0E0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Relax Button — Anti-Stress</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
    :root {
        --bg: #E0E0E0;
        --btn: #E0E0E0;
        --shadow-l: #ffffff;
        --shadow-d: #bebebe;
        --surface: rgba(255,255,255,0.94);
        --surface-dim: rgba(0,0,0,0.04);
        --on-surface: #1C1B1F;
        --on-surface-var: rgba(28,27,31,0.55);
        --outline: rgba(0,0,0,0.10);
        --icon-color: rgba(0,0,0,0.22);
        --accent: #6750A4;
        --on-accent: #FFFFFF;
        --accent-container: rgba(103,80,164,0.12);
        --btn-size: 220px;
        --radius-xl: 28px;
        --radius-lg: 16px;
        --radius-md: 12px;
        --radius-sm: 8px;
        --radius-full: 9999px;
        --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --ease-standard: cubic-bezier(0.2, 0, 0, 1);
        --ease-decel: cubic-bezier(0.0, 0.0, 0.2, 1);
        --dur-press: 50ms;
        --dur-release: 350ms;
        --dur-theme: 800ms;
        --dur-sheet: 400ms;
    }

    [data-theme="arctic"] { --bg: #E3EDF7; --btn: #E3EDF7; --shadow-l: #ffffff; --shadow-d: #b8cadf; --surface: rgba(235,243,252,0.95); --surface-dim: rgba(0,0,0,0.03); --on-surface: #1a2a3a; --on-surface-var: rgba(26,42,58,0.55); --outline: rgba(0,0,0,0.08); --icon-color: rgba(0,0,0,0.22); --accent: #4A6FA5; --on-accent: #fff; --accent-container: rgba(74,111,165,0.12); }
    [data-theme="sage"] { --bg: #D1DBCB; --btn: #D1DBCB; --shadow-l: #e5ede0; --shadow-d: #b2c0a7; --surface: rgba(220,230,214,0.95); --surface-dim: rgba(0,0,0,0.03); --on-surface: #1a2a1a; --on-surface-var: rgba(26,42,26,0.55); --outline: rgba(0,0,0,0.08); --icon-color: rgba(0,0,0,0.22); --accent: #5A7A4A; --on-accent: #fff; --accent-container: rgba(90,122,74,0.12); }
    [data-theme="night"] { --bg: #121212; --btn: #121212; --shadow-l: #1e1e1e; --shadow-d: #080808; --surface: rgba(30,30,30,0.96); --surface-dim: rgba(255,255,255,0.05); --on-surface: #E6E1E5; --on-surface-var: rgba(230,225,229,0.55); --outline: rgba(255,255,255,0.10); --icon-color: rgba(255,255,255,0.22); --accent: #D0BCFF; --on-accent: #381E72; --accent-container: rgba(208,188,255,0.12); }
    [data-theme="cosmos"] { --bg: #1a1a2e; --btn: #1a1a2e; --shadow-l: #252540; --shadow-d: #10101e; --surface: rgba(30,30,50,0.96); --surface-dim: rgba(255,255,255,0.04); --on-surface: #d0d0f0; --on-surface-var: rgba(208,208,240,0.55); --outline: rgba(255,255,255,0.08); --icon-color: rgba(255,255,255,0.22); --accent: #8B80F0; --on-accent: #1a1a2e; --accent-container: rgba(139,128,240,0.12); }
    [data-theme="blush"] { --bg: #f0d0d8; --btn: #f0d0d8; --shadow-l: #fff0f4; --shadow-d: #d0b0b8; --surface: rgba(248,224,232,0.95); --surface-dim: rgba(0,0,0,0.03); --on-surface: #3a1a2a; --on-surface-var: rgba(58,26,42,0.55); --outline: rgba(0,0,0,0.08); --icon-color: rgba(0,0,0,0.22); --accent: #B05070; --on-accent: #fff; --accent-container: rgba(176,80,112,0.12); }
    [data-theme="obsidian"] { --bg: #0d0d0d; --btn: #0d0d0d; --shadow-l: #1a1a1a; --shadow-d: #000000; --surface: rgba(20,20,20,0.96); --surface-dim: rgba(255,255,255,0.04); --on-surface: #d0d0d0; --on-surface-var: rgba(208,208,208,0.55); --outline: rgba(255,255,255,0.08); --icon-color: rgba(255,255,255,0.22); --accent: #00E87B; --on-accent: #0d0d0d; --accent-container: rgba(0,232,123,0.12); }

    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; user-select: none; -webkit-user-select: none; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; line-height: 1.5; color: var(--on-surface); background-color: var(--bg); transition: background-color var(--dur-theme) var(--ease-standard), color var(--dur-theme) var(--ease-standard); }
    body { padding-top: env(safe-area-inset-top, 0); padding-bottom: env(safe-area-inset-bottom, 0); }
    @media (min-width: 600px) { body { display: flex; align-items: center; justify-content: center; } }
    </style>
    <script src="capacitor.js"></script>
</head>
<body>
    <div id="app" class="layout-bottom"></div>
    <script>
    window.AppState = { theme: 'classic', layout: 'bottom' };
    </script>
</body>
</html>
